# DB: ??? ? MySQL, ??? RDS ??? ????? ??
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/coffee?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=trace
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

server.servlet.session.timeout=120m

# JWT ???? ????? ??
jwt.secret=${JWT_SECRET:my-secret-key-my-secret-key-my-secret-key}
jwt.expiration=3600000


